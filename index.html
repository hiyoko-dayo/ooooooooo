<head>

<title>スマブラ風バトル 完全版</title>
<style>
body { margin:0; background:#111; color:#fff; text-align:center; }
canvas { background:#222; display:block; margin:20px auto; border:2px solid #fff; }
</style>
</head>
<body>
<h1>スマブラ風バトル（進化版）</h1>
<p>
P1: ←→移動 ↑ジャンプ Z攻撃 X必殺<br>
P2: A/D移動 Wジャンプ F攻撃 G必殺
</p>
<canvas id="game" width="700" height="350"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.5;

class Fighter {
  constructor(x, color, controls) {
    this.x = x;
    this.y = 200;
    this.vx = 0;
    this.vy = 0;
    this.width = 30;
    this.height = 30;
    this.color = color;
    this.hp = 0;
    this.stock = 3;
    this.jumpCount = 0;
    this.maxJump = 2;
    this.controls = controls;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.width, this.height);
  }

  update(platforms) {
    this.vy += gravity;
    this.x += this.vx;
    this.y += this.vy;

    let onGround = false;

    platforms.forEach(p => {
      if (this.x < p.x + p.w &&
          this.x + this.width > p.x &&
          this.y + this.height < p.y + 10 &&
          this.y + this.height + this.vy >= p.y) {
        this.y = p.y - this.height;
        this.vy = 0;
        onGround = true;
        this.jumpCount = 0;
      }
    });

    if (this.y > canvas.height) {
      this.respawn();
    }
  }

  respawn() {
    this.stock--;
    this.hp = 0;
    this.x = Math.random() * 600;
    this.y = 0;
    this.vx = this.vy = 0;
  }
}

const player1 = new Fighter(100, "cyan", {
  left: "ArrowLeft", right: "ArrowRight", jump: "ArrowUp", attack: "z", special: "x"
});

const player2 = new Fighter(500, "red", {
  left: "a", right: "d", jump: "w", attack: "f", special: "g"
});

document.addEventListener("keyup", e => keys[e.key] = false);
