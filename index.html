<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>
<style>
body {
  background:#111; color:#fff; text-align:center; font-family:sans-serif;
}
button {
  padding:10px 20px; font-size:16px; margin:10px;
}
.card {
  margin:20px auto; padding:20px; width:200px;
  border:2px solid #fff; border-radius:10px;
}
</style>
</head>
<body>
<h1>スマホ風ガチャゲーム</h1>
<p>ボタンを押してガチャを回そう！</p>
<button onclick="gacha()">ガチャを引く</button>
<button onclick="gacha10()">10連ガチャ</button>

<div id="result"></div>

<script>
const pool = [
  {name:"スライム", rarity:1},
  {name:"ゴブリン", rarity:1},
  {name:"ナイト", rarity:2},
  {name:"魔法使い", rarity:2},
  {name:"ドラゴン", rarity:3},
  {name:"伝説の勇者", rarity:4}
];

function getRandom(){
  const r = Math.random();
  if(r < 0.6) return 1;
  if(r < 0.85) return 2;
  if(r < 0.97) return 3;
  return 4;
}

function drawCard(){
  const rarity = getRandom();
  const candidates = pool.filter(c=>c.rarity===rarity);
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function rarityColor(r){
  return ["#aaa","#6cf","#f6c","gold"][r-1];
}

function show(card){
  const div = document.createElement("div");
  div.className = "card";
  div.style.borderColor = rarityColor(card.rarity);
  div.innerHTML = `<h2>${"★".repeat(card.rarity)}</h2><p>${card.name}</p>`;
  document.getElementById("result").prepend(div);
}

function gacha(){
  const card = drawCard();
  show(card);
}

function gacha10(){
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      show(drawCard());
    }, i*200);
  }
}
</script>
</body>
</html>
