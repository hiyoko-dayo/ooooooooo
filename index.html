<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼん風アクション（複数ステージ）</title>
<style>
body { margin:0; background:#111; color:#fff; text-align:center; }
canvas { background:#222; display:block; margin:20px auto; border:2px solid #fff; }
</style>
</head>
<body>
<h1>しょぼん風トラップアクション</h1>
<p>←→移動 ↑ジャンプ</p>
<canvas id="game" width="600" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.5;

const player = { x:50,y:200,w:20,h:20,vx:0,vy:0,onGround:false };
const keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

let stageIndex = 0;

const stages = [
  {
    ground:{x:0,y:280,w:600,h:20},
    goal:550,
    traps:[{x:200,y:260,w:20,h:20,active:false}]
  },
  {
    ground:{x:0,y:280,w:600,h:20},
    goal:550,
    traps:[
      {x:150,y:260,w:20,h:20,active:false},
      {x:350,y:260,w:20,h:20,active:false}
    ]
  },
  {
    ground:{x:0,y:280,w:600,h:20},
    goal:550,
    traps:[
      {x:100,y:260,w:20,h:20,active:false},
      {x:250,y:260,w:20,h:20,active:false},
      {x:450,y:260,w:20,h:20,active:false}
    ]
  }
];

function currentStage(){ return stages[stageIndex]; }

function reset(){
  player.x=50; player.y=200; player.vx=player.vy=0;
  currentStage().traps.forEach(t=>{t.active=false; t.y=260;});
}

function update(){
  let stage = currentStage();

  player.vx=0;
  if(keys["ArrowLeft"]) player.vx=-3;
  if(keys["ArrowRight"]) player.vx=3;

  if(keys["ArrowUp"] && player.onGround) player.vy=-10;

  player.vy+=gravity;
  player.x+=player.vx;
  player.y+=player.vy;

  // ground
  if(player.y+player.h>stage.ground.y){
    player.y=stage.ground.y-player.h;
    player.vy=0;
    player.onGround=true;
  } else player.onGround=false;

  // traps
  stage.traps.forEach(t=>{
    if(!t.active && player.x>t.x-40){
      t.active=true;
      t.y=240;
    }
    if(collide(player,t)){
      alert("やられた！");
      reset();
    }
  });

  // goal
  if(player.x>stage.goal){
    stageIndex++;
    if(stageIndex>=stages.length){
      alert("全ステージクリア！おめでとう！");
      stageIndex=0;
    } else {
      alert("ステージ"+(stageIndex+1)+"へ！");
    }
    reset();
  }
}

function collide(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function draw(){
  let stage=currentStage();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // player
  ctx.fillStyle="white";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // ground
  ctx.fillStyle="green";
  ctx.fillRect(stage.ground.x,stage.ground.y,stage.ground.w,stage.ground.h);

  // traps
  ctx.fillStyle="red";
  stage.traps.forEach(t=>ctx.fillRect(t.x,t.y,t.w,t.h));

  // goal
  ctx.fillStyle="yellow";
  ctx.fillRect(580,240,10,40);

  ctx.fillStyle="white";
  ctx.fillText("STAGE: "+(stageIndex+1), 10,20);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
