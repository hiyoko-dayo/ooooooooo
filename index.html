<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しょぼん風アクション</title>
<style>
body { margin:0; background:#111; color:#fff; text-align:center; }
canvas { background:#222; display:block; margin:20px auto; border:2px solid #fff; }
</style>
</head>
<body>
<h1>しょぼん風トラップアクション</h1>
<p>←→移動 ↑ジャンプ</p>
<canvas id="game" width="600" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.5;

const player = {
  x:50, y:200, w:20, h:20,
  vx:0, vy:0,
  onGround:false
};

const keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

const ground = {x:0,y:280,w:600,h:20};

let traps = [
  {x:200,y:260,w:20,h:20,active:false},
  {x:400,y:260,w:20,h:20,active:false}
];

function reset() {
  player.x = 50;
  player.y = 200;
  player.vx = player.vy = 0;
}

function update() {
  player.vx = 0;

  if (keys["ArrowLeft"]) player.vx = -3;
  if (keys["ArrowRight"]) player.vx = 3;

  if (keys["ArrowUp"] && player.onGround) {
    player.vy = -10;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  // 地面
  if (player.y + player.h > ground.y) {
    player.y = ground.y - player.h;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  // トラップ発動（しょぼん風）
  traps.forEach(t => {
    if (!t.active && player.x > t.x - 40) {
      t.active = true;
      t.y = 240; // 上に飛び出す
    }

    if (collide(player, t)) {
      alert("トラップにやられた！");
      reset();
      traps.forEach(t=>{t.active=false; t.y=260;});
    }
  });

  // ゴール
  if (player.x > 550) {
    alert("クリア！でも次はもっと難しいかも…");
    reset();
  }
}

function collide(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // プレイヤー
  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // 地面
  ctx.fillStyle = "green";
  ctx.fillRect(ground.x, ground.y, ground.w, ground.h);

  // トラップ
  ctx.fillStyle = "red";
  traps.forEach(t => ctx.fillRect(t.x, t.y, t.w, t.h));

  // ゴール
  ctx.fillStyle = "yellow";
  ctx.fillRect(580,240,10,40);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
